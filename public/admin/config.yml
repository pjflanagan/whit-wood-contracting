backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site_config
    label: Site Config
    files:
      - name: config
        label: Site Configuration
        file: content/site-config.json
        format: json
        fields:
          - { label: Business Name, name: businessName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: CTA Button Label, name: ctaLabel, widget: string }
          - { label: SEO Description, name: seoDescription, widget: text, required: false }
          - { label: SEO Keywords, name: seoKeywords, widget: string, required: false }

  - name: site_images
    label: Site Images
    files:
      - name: images
        label: Site Images
        file: content/site-images.json
        format: json
        fields:
          - { label: Logo, name: logoUrl, widget: image, required: false }
          - { label: Hero Image, name: heroImageUrl, widget: image, required: false }
          - { label: Share Card (OG Image), name: shareCardUrl, widget: image, required: false }

  - name: social_links
    label: Social Links
    files:
      - name: links
        label: Social Links
        file: content/social-links.json
        format: json
        fields:
          - { label: Facebook URL, name: facebookUrl, widget: string, required: false }
          - { label: Instagram URL, name: instagramUrl, widget: string, required: false }
          - { label: Houzz URL, name: houzzUrl, widget: string, required: false }
          - { label: Yelp URL, name: yelpUrl, widget: string, required: false }
          - { label: Google URL, name: googleUrl, widget: string, required: false }

  - name: sections
    label: Page Sections
    files:
      - name: sections
        label: Section Headings
        file: content/sections.json
        format: json
        fields:
          - name: sections
            label: Sections
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: string, required: false }

  - name: about
    label: About
    files:
      - name: about
        label: About Section
        file: content/about.json
        format: json
        fields:
          - { label: Body, name: body, widget: markdown }

  - name: services
    label: Services
    files:
      - name: services
        label: Services
        file: content/services.json
        format: json
        fields:
          - name: services
            label: Services
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

  - name: portfolio
    label: Portfolio
    files:
      - name: portfolio
        label: Portfolio
        file: content/portfolio.json
        format: json
        fields:
          - name: portfolio
            label: Portfolio Items
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Type, name: type, widget: string, required: false }
              - { label: Photos, name: photos, widget: list, field: { label: Photo, name: photo, widget: image }, required: false }

  - name: testimonials
    label: Testimonials
    files:
      - name: testimonials
        label: Testimonials
        file: content/testimonials.json
        format: json
        fields:
          - name: testimonials
            label: Testimonials
            widget: list
            fields:
              - { label: Client Name, name: clientName, widget: string }
              - { label: Quote, name: quote, widget: text }
              - { label: Rating, name: rating, widget: number, value_type: float, min: 1, max: 5, step: 0.5 }
